<nav class="blog-navbar glass">
  <div class="nav-container">
    <div class="nav-brand">
      <a routerLink="/blog" class="brand-link">
          <span class="brand-logo">M</span>
        <div class="brand-text">
          <span class="brand-name">MiguelDev</span>
          <span class="brand-tagline">{{ 'blog.nav.community' | translate }}</span>
        </div>
      </a>
    </div>

    <div class="nav-links" [class.open]="isMenuOpen">
      <a routerLink="/blog" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link" (click)="isMenuOpen = false">
        <i class="bi bi-house-door"></i>
        {{ 'blog.nav.home' | translate }}
      </a>
      <a (click)="navigateToPortfolio(); isMenuOpen = false" class="nav-link clickable">
        <i class="bi bi-person-badge"></i>
        {{ 'blog.nav.portfolio' | translate }}
      </a>
      
      <div class="nav-actions mobile-only">
        <app-language-toggle></app-language-toggle>
        <button class="btn-login" routerLink="/auth/login" (click)="isMenuOpen = false">{{ 'blog.nav.login' | translate }}</button>
        <button class="btn-join" routerLink="/auth/signup" (click)="isMenuOpen = false">{{ 'blog.nav.join' | translate }}</button>
      </div>
    </div>

    <div class="nav-right desktop-only">
      <app-language-toggle></app-language-toggle>
      <button
        class="theme-toggle"
        (click)="toggleTheme()"
        [attr.aria-label]="(themeService.isDarkTheme() ? 'blog.nav.themeToLight' : 'blog.nav.themeToDark') | translate"
        [title]="(themeService.isDarkTheme() ? 'blog.nav.themeToLight' : 'blog.nav.themeToDark') | translate"
      >
        <i class="bi" [class.bi-sun]="!themeService.isDarkTheme()" [class.bi-moon-stars]="themeService.isDarkTheme()"></i>
      </button>
      <div class="divider"></div>
      <button class="btn-login" routerLink="/auth/login">{{ 'blog.nav.login' | translate }}</button>
      <button class="btn-join" routerLink="/auth/signup">{{ 'blog.nav.join' | translate }}</button>
    </div>

    <button class="menu-toggle" (click)="toggleMenu()" [attr.aria-label]="'blog.nav.menu' | translate">
      <i class="bi" [class.bi-list]="!isMenuOpen" [class.bi-x-lg]="isMenuOpen"></i>
    </button>
  </div>
</nav>
