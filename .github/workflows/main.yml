name: CI/CD MiguelDev Community Platform

on:
  push:
    branches: ["demo", "main"]
  pull_request:
    branches: ["demo", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  NODE_VERSION: '18'

jobs:
  backend-build:
    name: Build & Push Backend
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      - name: 🔧 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: ⚙️ Configure Docker for GCP
        run: gcloud auth configure-docker --quiet
      - name: 🏗️ Build & Push Container
        run: |
          ENV="${{ github.ref_name == 'main' && 'prod' || 'demo' }}"
          IMAGE_NAME="gcr.io/${{ env.GCP_PROJECT_ID }}/migueldev-blog-$ENV-api:latest"
          docker build -t $IMAGE_NAME ./backend
          docker push $IMAGE_NAME

  portfolio-build:
    name: Build & Push Portfolio App
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      - name: 🔧 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: ⚙️ Configure Docker for GCP
        run: gcloud auth configure-docker --quiet
      - name: 🏗️ Build & Push Container
        run: |
          ENV="${{ github.ref_name == 'main' && 'prod' || 'demo' }}"
          CONFIG="${{ github.ref_name == 'main' && 'production' || 'demo' }}"
          IMAGE_NAME="gcr.io/${{ env.GCP_PROJECT_ID }}/migueldev-blog-$ENV-frontend:latest"
          docker build --build-arg CONFIG=$CONFIG -t $IMAGE_NAME -f apps/portfolio/Dockerfile .
          docker push $IMAGE_NAME

  community-build:
    name: Build & Push Community App
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      - name: 🔧 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: ⚙️ Configure Docker for GCP
        run: gcloud auth configure-docker --quiet
      - name: 🏗️ Build & Push Container
        run: |
          ENV="${{ github.ref_name == 'main' && 'prod' || 'demo' }}"
          CONFIG="${{ github.ref_name == 'main' && 'production' || 'demo' }}"
          IMAGE_NAME="gcr.io/${{ env.GCP_PROJECT_ID }}/migueldev-blog-$ENV-community:latest"
          docker build --build-arg CONFIG=$CONFIG -t $IMAGE_NAME -f apps/community/Dockerfile .
          docker push $IMAGE_NAME

  infrastructure:
    name: Terraform Plan/Apply
    needs: [backend-build, portfolio-build, community-build]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
      - name: 🔧 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: 🛠️ Setup Terraform
        uses: hashicorp/setup-terraform@v3
      - name: 🏗️ Terraform Init & Apply
        run: |
          cd infrastructure/terraform/environments/${{ github.ref_name == 'main' && 'prod' || 'demo' }}
          terraform init
          terraform apply -auto-approve -var="project_id=${{ env.GCP_PROJECT_ID }}"

  deployment-refresh:
    name: Final Deployment Sync
    needs: infrastructure
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    steps:
      - name: 🔧 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - name: 🚀 Update All Services
        run: |
          ENV="${{ github.ref_name == 'main' && 'prod' || 'demo' }}"
          # Update API
          gcloud run deploy migueldev-blog-$ENV-api --image gcr.io/${{ env.GCP_PROJECT_ID }}/migueldev-blog-$ENV-api:latest --region ${{ env.REGION }} --platform managed --allow-unauthenticated
          # Update Portfolio
          gcloud run deploy migueldev-blog-$ENV-frontend --image gcr.io/${{ env.GCP_PROJECT_ID }}/migueldev-blog-$ENV-frontend:latest --region ${{ env.REGION }} --platform managed --allow-unauthenticated
          # Update Community
          gcloud run deploy migueldev-blog-$ENV-community --image gcr.io/${{ env.GCP_PROJECT_ID }}/migueldev-blog-$ENV-community:latest --region ${{ env.REGION }} --platform managed --allow-unauthenticated
