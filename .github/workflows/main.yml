name: CI/CD MiguelDev Community Platform

on:
  push:
    branches: ["demo", "main"]
  pull_request:
    branches: ["demo", "main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  NODE_VERSION: '18'

jobs:
  infrastructure:
    name: Terraform Plan/Apply
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: 🛠️ Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: 🏗️ Terraform Init & Apply
        run: |
          cd infrastructure/terraform/environments/${{ github.ref_name == 'main' && 'prod' || 'demo' }}
          terraform init
          terraform apply -auto-approve -var="project_id=${{ env.GCP_PROJECT_ID }}"

  backend-deploy:
    name: Build & Deploy Backend
    needs: infrastructure
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: ⚙️ Configure Docker for GCP
        run: gcloud auth configure-docker --quiet

      - name: 🏗️ Build & Push Container
        run: |
          IMAGE_NAME="gcr.io/${{ env.GCP_PROJECT_ID }}/migueldev-blog-${{ github.ref_name == 'main' && 'prod' || 'demo' }}-api:latest"
          docker build -t $IMAGE_NAME ./backend
          docker push $IMAGE_NAME

      - name: 🚀 Deploy to Cloud Run
        run: |
          APP_NAME="migueldev-blog-${{ github.ref_name == 'main' && 'prod' || 'demo' }}-api"
          gcloud run deploy $APP_NAME \
            --image "gcr.io/${{ env.GCP_PROJECT_ID }}/migueldev-blog-${{ github.ref_name == 'main' && 'prod' || 'demo' }}-api:latest" \
            --region ${{ env.REGION }} \
            --platform managed \
            --allow-unauthenticated

  frontend-build:
    name: Build Angular Portfolio
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci --legacy-peer-deps

      - name: 🏗️ Build Angular application
        run: |
          # Use different configuration if main/prod
          npm run build -- --project portfolio --configuration production --base-href /

      - name: 📤 Upload build artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/portfolio/browser

  frontend-deploy:
    name: Deploy to GitHub Pages
    needs: frontend-build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
